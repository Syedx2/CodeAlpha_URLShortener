<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Sniplink — Fast, Free URL Shortener</title>
    <meta name="description" content="Shorten long URLs into clean, shareable short links in one click. Fast, free, and private. Built with Flask and PostgreSQL.">
    <meta name="keywords" content="url shortener, link shortener, short url, sniplink, free url shortener">
    <meta name="author" content="Syed">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://snip-beta.vercel.app/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sniplink — Fast, Free URL Shortener">
    <meta property="og:description" content="Shorten long URLs into clean, shareable short links in one click. Fast, free, and private.">
    <meta property="og:url" content="https://snip-beta.vercel.app/">
    <meta property="og:site_name" content="Sniplink">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Sniplink — Fast, Free URL Shortener">
    <meta name="twitter:description" content="Shorten long URLs into clean, shareable short links in one click.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <!-- Animated background -->
    <div class="bg-gradient" aria-hidden="true"></div>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="header__icon" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
            </div>
            <h1 class="header__title">Sniplink</h1>
            <p class="header__subtitle">Shorten long URLs into clean, shareable links</p>
        </header>

        <!-- Shorten Form -->
        <main>
            <section class="card" id="shorten-card">
                <form class="form-group" id="shorten-form" autocomplete="off">
                    <input
                        type="text"
                        class="url-input"
                        id="url-input"
                        placeholder="Paste your long URL here..."
                        aria-label="Enter a URL to shorten"
                        required
                    >
                    <button type="submit" class="btn-shorten" id="btn-shorten">
                        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="6" cy="6" r="3"/>
                            <circle cx="6" cy="18" r="3"/>
                            <line x1="20" y1="4" x2="8.12" y2="15.88"/>
                            <line x1="14.47" y1="14.48" x2="20" y2="20"/>
                            <line x1="8.12" y1="8.12" x2="12" y2="12"/>
                        </svg>
                        <div class="spinner"></div>
                        <span>Shorten</span>
                    </button>
                </form>

                <!-- Error -->
                <div class="error-message" id="error-message" role="alert"></div>

                <!-- Result -->
                <div class="result-section" id="result-section">
                    <div class="result-card">
                        <div class="result-label">Your short link is ready</div>
                        <div class="result-url-row">
                            <div class="result-url" id="result-url"></div>
                            <button class="btn-copy" id="btn-copy" type="button" aria-label="Copy short URL">
                                <svg class="copy-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                                <span class="copy-text">Copy</span>
                            </button>
                        </div>
                        <div class="result-original" id="result-original"></div>
                    </div>
                </div>
            </section>

            <!-- Recent URLs -->
            <section class="recent-section" id="recent-section">
                <h2 class="section-title">Recent Links</h2>
                <div class="recent-list" id="recent-list">
                    <div class="recent-empty" id="recent-empty">No links shortened yet. Try one above!</div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Built by <strong>Syed</strong> &bull; <a href="https://github.com/Syedx2/CodeAlpha_URLShortener" target="_blank" rel="noopener">CodeAlpha</a> Internship 2026</p>
            <nav class="footer__nav" aria-label="Footer Navigation">
                <a href="/about">About</a>
                <span class="footer__nav-separator">&bull;</span>
                <a href="/privacy">Privacy Policy</a>
                <span class="footer__nav-separator">&bull;</span>
                <a href="/terms">Terms of Service</a>
            </nav>
            <div class="footer__links">
                <a href="https://github.com/Syedx2" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.445-3.36.73-4.065-1.44-4.065-1.44-.54-1.37-1.32-1.73-1.32-1.73-1.08-.735.08-.72.08-.72 1.2.085 1.83 1.235 1.83 1.235 1.07 1.835 2.81 1.305 3.495 1 .11-.78.42-1.305.76-1.605-2.665-.305-5.47-1.34-5.47-5.925 0-1.31.465-2.38 1.235-3.22-.135-.305-.54-1.53.115-3.18 0 0 1.005-.32 3.3 1.23.96-.27 1.98-.405 3-.41 1.02.005 2.04.14 3 .41 2.28-1.55 3.285-1.23 3.285-1.23.655 1.65.25 2.875.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.605-2.81 5.615-5.475 5.92.43.37.81 1.1.81 2.22 0 1.605-.015 2.895-.015 3.29 0 .315.225.69.825.57C20.565 21.795 24 17.31 24 12c0-6.63-5.37-12-12-12"/></svg>
                </a>
                <a href="https://www.linkedin.com/in/syed-abdul-raheem-7bb8453a9" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
                </a>
                <a href="mailto:syeds.devs@gmail.com" aria-label="Email" title="Email">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </a>
            </div>
            <p class="footer__tech">Flask &bull; PostgreSQL &bull; Vercel</p>
        </footer>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
